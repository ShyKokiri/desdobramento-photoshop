<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Desdobramento</title>
<script src="index.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111;
    --surface: #191919;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #096a9b;
    --accent-dim: #062738;
    --text: #f0f0f0;
    --muted: #666;
    --dim: #3a3a3a;
    --r: 10px;
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica';
    font-size: 13px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 100vh;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .logo-dot {
    width: 24px; height: 24px;
    background: var(--accent);
    border-radius: 5px;
    display: grid; place-items: center;
  }
  .logo-dot svg { color: #fff; }
  h1 { font-size: 13px; font-weight: 800; letter-spacing: -0.3px; }
  h1 span { color: var(--accent); }
  .version {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 20px;
  }

  .selection-chip {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color .2s;
  }
  .selection-chip.active { border-color: var(--accent); }
  .chip-icon {
    width: 28px; height: 28px;
    background: var(--surface2);
    border-radius: 5px;
    display: grid; place-items: center;
    flex-shrink: 0;
    color: var(--muted);
  }
  .selection-chip.active .chip-icon { background: var(--accent-dim); color: var(--accent); }
  .chip-text { flex: 1; }
  .chip-name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .chip-dim { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 1px; }
  .chip-empty { font-size: 12px; color: var(--muted); }

  .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .formats-section { display: flex; flex-direction: column; }
  .formats-list { display: flex; flex-direction: column; gap: 6px; }

  .format-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    padding: 9px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .format-card:hover { border-color: #444; }
  .format-card.selected { border-color: var(--accent); background: var(--accent-dim); }

  .fmt-check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: background .15s, border-color .15s;
  }
  .format-card.selected .fmt-check { background: var(--accent); border-color: var(--accent); }
  .fmt-check svg { display: none; }
  .format-card.selected .fmt-check svg { display: block; }

  .fmt-preview { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .fmt-rect { background: var(--dim); border-radius: 2px; transition: background .15s; }
  .format-card.selected .fmt-rect { background: #f0f0f0; }

  .fmt-info { flex: 1; }
  .fmt-name { font-size: 12px; font-weight: 700; }
  .fmt-size { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 1px; }

  .custom-card {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: var(--r);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .custom-row { display: flex; align-items: center; gap: 8px; }
  .custom-label { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 50px; }
  .custom-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 8px;
    width: 70px;
    outline: none;
    transition: border-color .2s;
  }
  .custom-input:focus { border-color: var(--accent); }
  .px { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .custom-name-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    padding: 5px 8px;
    flex: 1;
    outline: none;
    transition: border-color .2s;
  }
  .custom-name-input:focus { border-color: var(--accent); }
  .btn-add-custom {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 5px;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .2s;
  }
  .btn-add-custom:hover { opacity: .85; }

  .options-row { display: flex; gap: 8px; align-items: center; }
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 7px 10px;
    cursor: pointer;
    flex: 1;
    transition: border-color .2s;
  }
  .toggle-wrap.active { border-color: var(--accent); }
  .toggle {
    width: 28px; height: 16px;
    background: var(--dim);
    border-radius: 8px;
    position: relative;
    transition: background .2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: white;
    border-radius: 50%;
    transition: transform .2s;
  }
  .toggle-wrap.active .toggle { background: var(--accent); }
  .toggle-wrap.active .toggle::after { transform: translateX(12px); }
  .toggle-text { font-size: 11px; font-weight: 600; color: var(--muted); }
  .toggle-wrap.active .toggle-text { color: var(--text); }

  .gap-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 7px 10px;
  }
  .gap-label { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .gap-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 6px;
    width: 44px;
    outline: none;
    text-align: center;
  }
  .gap-input:focus { border-color: var(--accent); }

  .btn-generate {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--r);
    font-family: 'Helvetica';
    font-size: 13px;
    font-weight: 800;
    padding: 13px;
    cursor: pointer;
    width: 100%;
    letter-spacing: .3px;
    transition: opacity .2s, transform .1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-generate:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
  .btn-generate:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  .feedback {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.success { border-color: rgba(9,106,155,.5); color: #5bb8f5; }
  .feedback.error { border-color: rgba(255,80,80,.3); color: #ff8080; }

  .results-list { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
  .result-item { display: flex; align-items: center; gap: 6px; }
  .result-item::before { content: '↳'; color: var(--dim); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-dot">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <polyline points="5 12 10 17 20 7"/>
      </svg>
    </div>
    <h1>Desdobra<span>mento</span> Daive</h1>
  </div>
  <span class="version">v1.0</span>
</div>

<div class="selection-chip" id="selectionChip">
  <div class="chip-icon">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
    </svg>
  </div>
  <div class="chip-text">
    <div class="chip-empty" id="chipEmpty">Selecione um artboard no Photoshop</div>
    <div class="chip-name" id="chipName" style="display:none"></div>
    <div class="chip-dim" id="chipDim" style="display:none"></div>
  </div>
</div>

<div class="formats-section">
  <div class="label">Formatos de saída</div>
  <div class="formats-list" id="formatsList"></div>
</div>

<div class="custom-card">
  <div class="label" style="margin-bottom:0">+ Formato personalizado</div>
  <div class="custom-row">
    <span class="custom-label">Nome</span>
    <input type="text" class="custom-name-input" id="customName" placeholder="Ex: Banner email" />
  </div>
  <div class="custom-row">
    <span class="custom-label">Largura</span>
    <input type="number" class="custom-input" id="customW" placeholder="1200" min="1" />
    <span class="px">px</span>
    <span class="custom-label" style="text-align:right;width:auto;">Altura</span>
    <input type="number" class="custom-input" id="customH" placeholder="628" min="1" />
    <span class="px">px</span>
    <button class="btn-add-custom" id="btnAddCustom">Adicionar</button>
  </div>
</div>

<div>
  <div class="label">Opções</div>
  <div class="options-row">
    <div class="toggle-wrap active" id="toggleSmartCrop">
      <div class="toggle"></div>
      <span class="toggle-text">Recorte inteligente</span>
    </div>
    <div class="gap-wrap">
      <span class="gap-label">Gap</span>
      <input type="number" class="gap-input" id="gapInput" value="100" min="0" max="500" />
      <span class="px">px</span>
    </div>
  </div>
</div>

<button class="btn-generate" id="btnGenerate" disabled>
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
  </svg>
  <span id="btnLabel">Gerar desdobramentos</span>
</button>

<div class="feedback" id="feedback"></div>

<script>
const PRESETS = [
  { id: "feed",     label: "Feed Instagram",  sublabel: "1:1",    width: 1080, height: 1080, w: 18, h: 18 },
  { id: "stories",  label: "Stories / Reels", sublabel: "9:16",   width: 1080, height: 1920, w: 10, h: 18 },
  { id: "linkedin", label: "Banner LinkedIn", sublabel: "1.91:1", width: 1200, height: 628,  w: 18, h: 9  },
  { id: "twitter",  label: "Post X / Twitter",sublabel: "16:9",   width: 1600, height: 900,  w: 18, h: 10 },
];

let formats = PRESETS.map(p => ({ ...p, selected: p.id === "feed" || p.id === "stories" }));
let customFormats = [];
let selectedFrame = null;
let smartCrop = true;

function renderFormats() {
  const list = document.getElementById("formatsList");
  list.innerHTML = "";
  [...formats, ...customFormats].forEach((fmt, idx) => {
    const card = document.createElement("div");
    card.className = "format-card" + (fmt.selected ? " selected" : "");
    card.innerHTML = `
      <div class="fmt-check">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="fmt-preview">
        <div class="fmt-rect" style="width:${fmt.w}px;height:${fmt.h}px;"></div>
      </div>
      <div class="fmt-info">
        <div class="fmt-name">${fmt.label}</div>
        <div class="fmt-size">${fmt.width} × ${fmt.height}px — ${fmt.sublabel}</div>
      </div>
    `;
    card.addEventListener("click", () => {
      if (idx < formats.length) formats[idx].selected = !formats[idx].selected;
      else customFormats[idx - formats.length].selected = !customFormats[idx - formats.length].selected;
      renderFormats();
      updateBtn();
    });
    list.appendChild(card);
  });
}

function updateChip(frame) {
  selectedFrame = frame;
  const chip = document.getElementById("selectionChip");
  const empty = document.getElementById("chipEmpty");
  const name = document.getElementById("chipName");
  const dim = document.getElementById("chipDim");
  if (frame) {
    chip.classList.add("active");
    empty.style.display = "none";
    name.style.display = "block";
    dim.style.display = "block";
    name.textContent = frame.name;
    dim.textContent = `${frame.width} × ${frame.height}px`;
  } else {
    chip.classList.remove("active");
    empty.style.display = "block";
    name.style.display = "none";
    dim.style.display = "none";
  }
  updateBtn();
}

function updateBtn() {
  const anySelected = [...formats, ...customFormats].some(f => f.selected);
  const count = [...formats, ...customFormats].filter(f => f.selected).length;
  const btn = document.getElementById("btnGenerate");
  btn.disabled = !selectedFrame || !anySelected;
  document.getElementById("btnLabel").textContent =
    anySelected ? `Gerar ${count} desdobramento${count !== 1 ? "s" : ""}` : "Gerar desdobramentos";
}

function showFeedback(type, html) {
  const el = document.getElementById("feedback");
  el.className = `feedback show ${type}`;
  el.innerHTML = html;
}

// Polling de seleção (PS não tem evento de seleção confiável na UXP)
async function pollSelection() {
  try {
    const frame = await window.__desdobramento.getSelection();
    updateChip(frame);
  } catch(e) {}
  setTimeout(pollSelection, 1000);
}

document.getElementById("toggleSmartCrop").addEventListener("click", function() {
  smartCrop = !smartCrop;
  this.classList.toggle("active", smartCrop);
});

document.getElementById("btnAddCustom").addEventListener("click", () => {
  const name = document.getElementById("customName").value.trim();
  const w = parseInt(document.getElementById("customW").value);
  const h = parseInt(document.getElementById("customH").value);
  if (!name || !w || !h) return showFeedback("error", "Preencha nome, largura e altura.");
  const maxDim = 18;
  customFormats.push({
    id: `custom_${Date.now()}`,
    label: name,
    sublabel: `${(w/h).toFixed(2)}:1`,
    width: w, height: h,
    w: w >= h ? maxDim : Math.round((w/h)*maxDim),
    h: h >= w ? maxDim : Math.round((h/w)*maxDim),
    selected: true,
  });
  document.getElementById("customName").value = "";
  document.getElementById("customW").value = "";
  document.getElementById("customH").value = "";
  renderFormats();
  updateBtn();
  document.getElementById("feedback").className = "feedback";
});

document.getElementById("btnGenerate").addEventListener("click", async () => {
  const selected = [...formats, ...customFormats].filter(f => f.selected);
  const gap = parseInt(document.getElementById("gapInput").value) || 100;
  document.getElementById("btnGenerate").disabled = true;
  document.getElementById("btnLabel").textContent = "Gerando...";
  try {
    const results = await window.__desdobramento.generate({
      formats: selected.map(f => ({ label: f.label, width: f.width, height: f.height })),
      gap,
      smartCrop,
    });
    const items = results.map(r => `<div class="result-item">${r.name} — ${r.width}×${r.height}px</div>`).join("");
    showFeedback("success", `✓ ${results.length} artboard${results.length !== 1 ? "s" : ""} gerado${results.length !== 1 ? "s" : ""}<div class="results-list">${items}</div>`);
  } catch(e) {
    showFeedback("error", `⚠ ${e.message}`);
  } finally {
    updateBtn();
  }
});

renderFormats();
pollSelection();
</script>
</body>
</html>
